function detectSystem(){

    const ua =
    navigator.userAgent;

    // iPhone / iPad

    if(

        /iPhone|iPad|iPod/i.test(ua)

        ||

        (
            navigator.platform === 'MacIntel'

            &&

            navigator.maxTouchPoints > 1
        )

    ){

        return "📱 iPhone / iPad";
    }

    // Android

    if(/Android/i.test(ua)){

        return "🤖 Android";
    }

    // Windows

    if(/Windows/i.test(ua)){

        return "🖥 Windows";
    }

    // macOS

    if(/Macintosh|Mac OS X/i.test(ua)){

        return "🍎 macOS";
    }

    return "🌐 Unknown";
}

/*

自动识别系统导入
====================================
*/

function importSub(index){

    const item =
    subscriptions[index];

    if(!verifyPassword(item)){

        return;
    }

    const ua =
    navigator.userAgent;

    let scheme = "";

    // iPhone / iPad

    if(

        /iPhone|iPad|iPod/i.test(ua)

        ||

        (
            navigator.platform === 'MacIntel'

            &&

            navigator.maxTouchPoints > 1
        )

    ){

        scheme =

        "clash://install-config?url=" +

        encodeURIComponent(item.url);
    }

    // Android

    else if(/Android/i.test(ua)){

        scheme =

        "clash://install-config?url=" +

        encodeURIComponent(item.url);
    }

    // Windows / macOS

    else{

        scheme =

        "clash://install-config?url=" +

        encodeURIComponent(item.url);
    }

    window.location.href =
    scheme;
}

/*

复制
====================================
*/

async function copySub(index){

    const item =
    subscriptions[index];

    if(!verifyPassword(item)){

        return;
    }

    try{

        await navigator.clipboard
        .writeText(item.url);

        alert("订阅链接已复制");

    }catch(e){
