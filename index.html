<!DOCTYPE html>
<html lang="zh-CN">

<head>

<!-- ～～～～～～～～ 基础信息 ～～～～～～～～ -->

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Clash 一键导入
</title>

<style>

/* ～～～～～～～～ 全局 ～～～～～～～～ */

*{

    margin:0;
    padding:0;

    box-sizing:border-box;
}

body{

    background:#f5f5f7;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    sans-serif;

    color:#111827;

    padding:20px;
}

/* ～～～～～～～～ 顶部导航 ～～～～～～～～ */

.topbar{

    background:
    rgba(255,255,255,.75);

    backdrop-filter:
    blur(20px);

    border-radius:30px;

    padding:22px 30px;

    display:flex;

    align-items:center;

    margin-bottom:30px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

/* LOGO */

.logo{

    display:flex;

    align-items:center;

    gap:15px;
}

/* LOGO 图标 */

.logo-icon{

    width:50px;
    height:50px;

    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #4f8cff,
    #7c4dff
    );

    display:flex;

    justify-content:center;
    align-items:center;

    color:white;

    font-size:26px;
}

/* LOGO 文字 */

.logo-text{

    font-size:34px;

    font-weight:800;
}

/* 渐变文字 */

.logo-text span{

    background:
    linear-gradient(
    90deg,
    #3b82f6,
    #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* ～～～～～～～～ 主布局 ～～～～～～～～ */

.container{

    display:grid;

    grid-template-columns:
    1fr 320px;

    gap:25px;
}

/* ～～～～～～～～ Hero 区域 ～～～～～～～～ */

.hero{

    background:white;

    border-radius:32px;

    padding:35px;

    margin-bottom:25px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);

    text-align:center;
}

/* 主标题 */

.hero h1{

    font-size:62px;

    margin-bottom:12px;
}

/* 标题渐变 */

.hero h1 span{

    background:
    linear-gradient(
    90deg,
    #3b82f6,
    #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* 副标题 */

.hero p{

    color:#6b7280;

    font-size:18px;
}

/* 当前系统 */

.system{

    margin-top:22px;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f3f4f6;

    padding:12px 18px;

    border-radius:999px;

    color:#2563eb;

    font-size:15px;

    width:fit-content;

    margin-left:auto;

    margin-right:auto;
}

/* ～～～～～～～～ 线路卡片 ～～～～～～～～ */

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;
}

/* 单个卡片 */

.card{

    background:white;

    border-radius:30px;

    padding:25px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);

    transition:.25s;
}

/* 卡片悬停 */

.card:hover{

    transform:
    translateY(-6px);
}

/* 图标 */

.icon{

    font-size:56px;

    margin-bottom:18px;
}

/* 标题 */

.card-title{

    font-size:28px;

    font-weight:700;

    margin-bottom:10px;
}

/* 描述 */

.card-desc{

    color:#6b7280;

    margin-bottom:22px;
}

/* 按钮 */

.btn{

    width:100%;

    border:none;

    padding:14px;

    border-radius:16px;

    color:white;

    font-size:16px;

    cursor:pointer;

    margin-bottom:12px;

    transition:.2s;
}

/* 按钮悬停 */

.btn:hover{

    opacity:.92;
}

/* 复制按钮 */

.copy{

    background:#f3f4f6;

    color:#111827;
}

/* ～～～～～～～～ 客服区域 ～～～～～～～～ */

.sidebar{

    display:flex;

    flex-direction:column;

    gap:20px;
}

.side-card{

    background:white;

    border-radius:30px;

    padding:28px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.side-title{

    font-size:30px;

    font-weight:700;

    margin-bottom:22px;
}

/* 联系方式 */

.contact{

    display:flex;

    align-items:center;

    gap:16px;

    background:#f9fafb;

    padding:18px;

    border-radius:22px;

    margin-bottom:15px;
}

/* 联系图标 */

.contact-icon{

    font-size:34px;
}

/* 联系标题 */

.contact-name{

    font-weight:700;

    margin-bottom:5px;
}

/* 联系内容 */

.contact-value{

    color:#6b7280;
}

/* ～～～～～～～～ 提示区域 ～～～～～～～～ */

.notice{

    margin-top:28px;

    background:white;

    border-radius:24px;

    padding:22px;

    text-align:center;

    color:#f59e0b;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

/* ～～～～～～～～ 页脚 ～～～～～～～～ */

.footer{

    margin-top:25px;

    text-align:center;

    color:#6b7280;

    line-height:1.8;
}

/* ～～～～～～～～ 手机优化 ～～～～～～～～ */

@media(max-width:980px){

    body{

        padding:8px;
    }

    .container{

        grid-template-columns:1fr;
    }

    .topbar{

        padding:10px 14px;

        border-radius:16px;

        margin-bottom:10px;
    }

    .logo{

        gap:10px;
    }

    .logo-icon{

        width:34px;
        height:34px;

        font-size:16px;

        border-radius:12px;
    }

    .logo-text{

        font-size:18px;
    }

    .hero{

        padding:16px;

        border-radius:18px;

        margin-bottom:12px;
    }

    .hero h1{

        font-size:30px;

        line-height:1.15;

        margin-bottom:8px;
    }

    .hero p{

        font-size:13px;
    }

    .system{

        margin-top:12px;

        padding:7px 12px;

        font-size:12px;
    }

    /* 手机双列 */

    .grid{

        grid-template-columns:
        repeat(2,1fr);

        gap:8px;
    }

    /* 手机卡片 */

    .card{

        padding:10px;

        border-radius:18px;
    }

    .icon{

        font-size:28px;

        margin-bottom:6px;
    }

    .card-title{

        font-size:15px;

        margin-bottom:3px;
    }

    .card-desc{

        font-size:11px;

        margin-bottom:8px;
    }

    .btn{

        padding:6px;

        border-radius:10px;

        font-size:12px;

        margin-bottom:6px;
    }
}

</style>

</head>

<body>

<!-- ～～～～～～～～ 顶部导航 ～～～～～～～～ -->

<div class="topbar">

    <div class="logo">

        <div class="logo-icon">
            🚀
        </div>

        <div class="logo-text">

            <span>Clash</span>

            一键导入

        </div>

    </div>

</div>

<!-- ～～～～～～～～ 主布局 ～～～～～～～～ -->

<div class="container">

<!-- 左侧 -->

<div>

<!-- Hero -->

<div class="hero">

    <h1>

        <span>Clash</span>

        一键导入

    </h1>

    <p>

        自动识别 Windows / macOS / Android / iPhone

    </p>

    <div
    class="system"
    id="system">

        正在识别系统...

    </div>

</div>

<!-- 线路卡片 -->

<div
class="grid"
id="grid"></div>

<!-- 提示 -->

<div class="notice">

    若无法自动拉起客户端，请复制订阅后手动导入。

</div>

<!-- 页脚 -->

<div class="footer">

    安全连接 · 隐私保护 · 永不记录用户信息

    <br>

    Powered By GitHub Pages

</div>

</div>

<!-- 右侧 -->

<div class="sidebar">

<div class="side-card">

    <div class="side-title">

        客服支持

    </div>

    <!-- QQ -->

    <div class="contact">

        <div class="contact-icon">
            🐧
        </div>

        <div>

            <div class="contact-name">
                联系 QQ
            </div>

            <div class="contact-value">
                1146268509
            </div>

        </div>

    </div>

</div>

</div>

</div>

<script>

/* ～～～～～～～～ 系统识别 ～～～～～～～～ */

function detectSystem(){

    const ua =
    navigator.userAgent;

    if(

        /iPhone|iPad|iPod/i.test(ua)

        ||

        (
            navigator.platform === 'MacIntel'

            &&

            navigator.maxTouchPoints > 1
        )

    ){

        return "📱 iPhone / iPad";
    }

    if(/Android/i.test(ua)){

        return "🤖 Android";
    }

    if(/Windows/i.test(ua)){

        return "🖥 Windows";
    }

    if(/Macintosh|Mac OS X/i.test(ua)){

        return "🍎 macOS";
    }

    return "🌐 Unknown";
}

/* 显示系统 */

document.getElementById("system")
.innerText =
"当前系统：" + detectSystem();

</script>

</body>

</html>
