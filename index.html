<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clash 一键导入</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#f5f5f7;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    sans-serif;

    color:#111827;

    padding:20px;
}

/* 顶部 */

.topbar{

    background:
    rgba(255,255,255,.75);

    backdrop-filter:
    blur(20px);

    border-radius:30px;

    padding:18px 24px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.logo{

    display:flex;

    align-items:center;

    gap:12px;
}

.logo-icon{

    width:42px;
    height:42px;

    border-radius:14px;

    background:
    linear-gradient(
    135deg,
    #4f8cff,
    #7c4dff
    );

    display:flex;

    justify-content:center;
    align-items:center;

    color:white;

    font-size:20px;
}

.logo-text{

    font-size:28px;

    font-weight:800;
}

.logo-text span{

    background:
    linear-gradient(
    90deg,
    #3b82f6,
    #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* 布局 */

.container{

    display:grid;

    grid-template-columns:
    1fr 300px;

    gap:20px;
}

/* Hero */

.hero{

    background:white;

    border-radius:30px;

    padding:30px;

    margin-bottom:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.hero h1{

    font-size:54px;

    margin-bottom:10px;
}

.hero h1 span{

    background:
    linear-gradient(
    90deg,
    #3b82f6,
    #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.hero p{

    color:#6b7280;

    font-size:16px;
}

.system{

    margin-top:18px;

    display:inline-block;

    background:#f3f4f6;

    padding:10px 16px;

    border-radius:999px;

    color:#2563eb;

    font-size:14px;
}

/* 卡片 */

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:15px;
}

.card{

    background:white;

    border-radius:26px;

    padding:20px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);

    transition:.25s;
}

.card:hover{

    transform:
    translateY(-5px);
}

.icon{

    width:58px;
    height:58px;

    margin-bottom:15px;
}

.icon img{

    width:100%;
    height:100%;

    object-fit:contain;
}

.card-title{

    font-size:24px;

    font-weight:700;

    margin-bottom:8px;
}

.card-desc{

    color:#6b7280;

    font-size:14px;

    margin-bottom:18px;
}

.btn{

    width:100%;

    border:none;

    padding:12px;

    border-radius:14px;

    color:white;

    font-size:15px;

    cursor:pointer;

    margin-bottom:10px;

    transition:.2s;
}

.btn:hover{

    opacity:.92;
}

.copy{

    background:#f3f4f6;

    color:#111827;
}

.copy:hover{

    background:#e5e7eb;
}

/* 右侧 */

.sidebar{

    display:flex;

    flex-direction:column;

    gap:18px;
}

.side-card{

    background:white;

    border-radius:28px;

    padding:24px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.side-title{

    font-size:26px;

    font-weight:700;

    margin-bottom:18px;
}

.contact{

    display:flex;

    align-items:center;

    gap:14px;

    background:#f9fafb;

    padding:16px;

    border-radius:18px;

    margin-bottom:12px;
}

.contact-icon{

    width:36px;
    height:36px;
}

.contact-icon img{

    width:100%;
    height:100%;
}

.contact-name{

    font-weight:700;

    margin-bottom:4px;
}

.contact-value{

    color:#6b7280;

    font-size:13px;
}

/* 提示 */

.notice{

    margin-top:20px;

    background:white;

    border-radius:20px;

    padding:18px;

    text-align:center;

    color:#f59e0b;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

/* 页脚 */

.footer{

    margin-top:20px;

    text-align:center;

    color:#6b7280;

    line-height:1.8;

    font-size:14px;
}

/* 手机 */

@media(max-width:980px){

    body{

        padding:10px;
    }

    .container{

        grid-template-columns:1fr;
    }

    .topbar{

        padding:14px 16px;

        border-radius:20px;
    }

    .logo-icon{

        width:34px;
        height:34px;

        font-size:16px;
    }

    .logo-text{

        font-size:22px;
    }

    .hero{

        padding:22px;

        border-radius:22px;
    }

    .hero h1{

        font-size:38px;

        line-height:1.2;
    }

    .hero p{

        font-size:14px;
    }

    .system{

        font-size:13px;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);

        gap:10px;
    }

    .card{

        padding:15px;

        border-radius:20px;
    }

    .icon{

        width:42px;
        height:42px;

        margin-bottom:10px;
    }

    .card-title{

        font-size:18px;
    }

    .card-desc{

        font-size:12px;

        margin-bottom:12px;
    }

    .btn{

        padding:10px;

        font-size:13px;

        border-radius:12px;
    }

    .side-card{

        padding:18px;
    }

    .side-title{

        font-size:22px;
    }

    .contact{

        padding:12px;
    }
}

</style>

</head>

<body>

<!-- 顶部 -->

<div class="topbar">

    <div class="logo">

        <div class="logo-icon">
            🚀
        </div>

        <div class="logo-text">
            <span>Clash</span> 一键导入
        </div>

    </div>

</div>

<div class="container">

<!-- 左边 -->

<div>

<div class="hero">

    <h1>
        <span>Clash</span> 一键导入
    </h1>

    <p>
        自动识别 Windows / macOS / Android / iPhone
    </p>

    <div class="system" id="system">
        正在识别系统...
    </div>

</div>

<!-- 线路 -->

<div class="grid" id="grid"></div>

<!-- 提示 -->

<div class="notice">
    若无法自动拉起客户端，请复制订阅后手动导入。
</div>

<!-- 页脚 -->

<div class="footer">
    安全连接 · 隐私保护 · 永不记录用户信息
    <br>
    Powered By GitHub Pages
</div>

</div>

<!-- 右边 -->

<div class="sidebar">

<div class="side-card">

    <div class="side-title">
        客服支持
    </div>

    <!-- QQ -->

    <div class="contact">

        <div class="contact-icon">

            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tencentqq.svg">

        </div>

        <div>

            <div class="contact-name">
                QQ
            </div>

            <div class="contact-value">
                123456789
            </div>

        </div>

    </div>

    <!-- 微信 -->

    <div class="contact">

        <div class="contact-icon">

            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/wechat.svg">

        </div>

        <div>

            <div class="contact-name">
                微信
            </div>

            <div class="contact-value">
                your_wechat
            </div>

        </div>

    </div>

    <!-- 邮箱 -->

    <div class="contact">

        <div class="contact-icon">

            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/maildotru.svg">

        </div>

        <div>

            <div class="contact-name">
                邮箱
            </div>

            <div class="contact-value">
                support@example.com
            </div>

        </div>

    </div>

</div>

</div>

</div>

<script>

/*
====================================
系统识别
====================================
*/

function detectSystem(){

    const ua =
    navigator.userAgent;

    // iPhone / iPad

    if(

        /iPhone|iPad|iPod/i.test(ua)

        ||

        (
            navigator.platform === 'MacIntel'
            &&
            navigator.maxTouchPoints > 1
        )

    ){

        return "📱 iPhone / iPad";
    }

    // Android

    if(/Android/i.test(ua)){

        return "🤖 Android";
    }

    // Windows

    if(/Windows/i.test(ua)){

        return "🖥 Windows";
    }

    // macOS

    if(/Macintosh|Mac OS X/i.test(ua)){

        return "🍎 macOS";
    }

    return "🌐 Unknown";
}

document.getElementById("system")
.innerText =
"当前系统：" + detectSystem();

/*
====================================
订阅线路
====================================
*/

const subscriptions = [

{
    name:"线路 1",
    icon:"rocket",
    color:"#3b82f6",
    password:"1111",
    url:"https://example.com/sub1.yaml"
},

{
    name:"线路 2",
    icon:"zap",
    color:"#22c55e",
    password:"2222",
    url:"https://example.com/sub2.yaml"
},

{
    name:"线路 3",
    icon:"planet",
    color:"#8b5cf6",
    password:"3333",
    url:"https://example.com/sub3.yaml"
},

{
    name:"线路 4",
    icon:"cloud",
    color:"#f59e0b",
    password:"4444",
    url:"https://example.com/sub4.yaml"
},

{
    name:"线路 5",
    icon:"shield",
    color:"#06b6d4",
    password:"5555",
    url:"https://example.com/sub5.yaml"
},

{
    name:"线路 6",
    icon:"wifi",
    color:"#ec4899",
    password:"6666",
    url:"https://example.com/sub6.yaml"
},

{
    name:"线路 7",
    icon:"globe",
    color:"#3b82f6",
    password:"7777",
    url:"https://example.com/sub7.yaml"
},

{
    name:"线路 8",
    icon:"star",
    color:"#eab308",
    password:"8888",
    url:"https://example.com/sub8.yaml"
},

{
    name:"线路 9",
    icon:"leaf",
    color:"#84cc16",
    password:"9999",
    url:"https://example.com/sub9.yaml"
},

{
    name:"线路 10",
    icon:"gem",
    color:"#8b5cf6",
    password:"0000",
    url:"https://example.com/sub10.yaml"
}

];

/*
====================================
密码验证
====================================
*/

function verifyPassword(item){

    const input =
    prompt("请输入该线路密码");

    if(input !== item.password){

        alert("密码错误");

        return false;
    }

    return true;
}

/*
====================================
生成线路卡片
====================================
*/

const grid =
document.getElementById("grid");

subscriptions.forEach((item,index)=>{

    const card =
    document.createElement("div");

    card.className = "card";

    card.innerHTML = `

    <div class="icon">

        <img
        src="
https://cdn.jsdelivr.net/gh/lucide-icons/lucide/icons/${item.icon}.svg
        ">

    </div>

    <div class="card-title">
        ${item.name}
    </div>

    <div class="card-desc">
        自动识别系统导入
    </div>

    <button
    class="btn"
    style="background:${item.color}"
    onclick="importSub(${index})">

        🚀 一键导入

    </button>

    <button
    class="btn copy"
    onclick="copySub(${index})">

        📋 复制链接

    </button>

    `;

    grid.appendChild(card);
});

/*
====================================
自动识别系统导入
====================================
*/

function importSub(index){

    const item =
    subscriptions[index];

    if(!verifyPassword(item)){

        return;
    }

    const ua =
    navigator.userAgent;

    let scheme = "";

    // iPhone / iPad

    if(

        /iPhone|iPad|iPod/i.test(ua)

        ||

        (
            navigator.platform === 'MacIntel'
            &&
            navigator.maxTouchPoints > 1
        )

    ){

        scheme =

        "shadowrocket://add/sub://" +

        btoa(item.url);
    }

    // Android

    else if(/Android/i.test(ua)){

        scheme =

        "clash://install-config?url=" +

        encodeURIComponent(item.url);
    }

    // Windows / macOS

    else{

        scheme =

        "clash://install-config?url=" +

        encodeURIComponent(item.url);
    }

    window.location.href =
    scheme;
}

/*
====================================
复制
====================================
*/

async function copySub(index){

    const item =
    subscriptions[index];

    if(!verifyPassword(item)){

        return;
    }

    try{

        await navigator.clipboard
        .writeText(item.url);

        alert("订阅链接已复制");

    }catch(e){

        alert("复制失败");
    }
}

</script>

</body>
</html>
