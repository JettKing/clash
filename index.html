<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clash 一键导入</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#f5f5f7;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    sans-serif;

    color:#111827;

    padding:20px;
}

.topbar{

    background:
    rgba(255,255,255,.75);

    backdrop-filter:
    blur(20px);

    border-radius:30px;

    padding:22px 30px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.logo{

    display:flex;

    align-items:center;

    gap:15px;
}

.logo-icon{

    width:50px;
    height:50px;

    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #4f8cff,
    #7c4dff
    );

    display:flex;

    justify-content:center;
    align-items:center;

    color:white;

    font-size:26px;
}

.logo-text{

    font-size:34px;

    font-weight:800;
}

.logo-text span{

    background:
    linear-gradient(
    90deg,
    #3b82f6,
    #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.container{

    display:grid;

    grid-template-columns:
    1fr 320px;

    gap:25px;
}

.hero{

    background:white;

    border-radius:32px;

    padding:35px;

    margin-bottom:25px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.hero h1{

    font-size:62px;

    margin-bottom:12px;
}

.hero h1 span{

    background:
    linear-gradient(
    90deg,
    #3b82f6,
    #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.hero p{

    color:#6b7280;

    font-size:18px;
}

.system{

    margin-top:22px;

    display:inline-block;

    background:#f3f4f6;

    padding:12px 18px;

    border-radius:999px;

    color:#2563eb;

    font-size:15px;
}

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;
}

.card{

    background:white;

    border-radius:30px;

    padding:25px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);

    transition:.25s;
}

.card:hover{

    transform:
    translateY(-6px);
}

.icon{

    font-size:56px;

    margin-bottom:18px;
}

.card-title{

    font-size:28px;

    font-weight:700;

    margin-bottom:10px;
}

.card-desc{

    color:#6b7280;

    margin-bottom:22px;
}

.btn{

    width:100%;

    border:none;

    padding:14px;

    border-radius:16px;

    color:white;

    font-size:16px;

    cursor:pointer;

    margin-bottom:12px;

    transition:.2s;
}

.btn:hover{

    opacity:.92;
}

.copy{

    background:#f3f4f6;

    color:#111827;
}

.copy:hover{

    background:#e5e7eb;
}

.sidebar{

    display:flex;

    flex-direction:column;

    gap:20px;
}

.side-card{

    background:white;

    border-radius:30px;

    padding:28px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.side-title{

    font-size:30px;

    font-weight:700;

    margin-bottom:22px;
}

.contact{

    display:flex;

    align-items:center;

    gap:16px;

    background:#f9fafb;

    padding:18px;

    border-radius:22px;

    margin-bottom:15px;
}

.contact-icon{

    font-size:34px;
}

.contact-name{

    font-weight:700;

    margin-bottom:5px;
}

.contact-value{

    color:#6b7280;
}

.notice{

    margin-top:28px;

    background:white;

    border-radius:24px;

    padding:22px;

    text-align:center;

    color:#f59e0b;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

.footer{

    margin-top:25px;

    text-align:center;

    color:#6b7280;

    line-height:1.8;
}

@media(max-width:980px){

    .container{

        grid-template-columns:1fr;
    }

    .hero h1{

        font-size:44px;
    }
}

</style>

</head>

<body>

<div class="topbar">

    <div class="logo">

        <div class="logo-icon">
            🚀
        </div>

        <div class="logo-text">
            <span>Clash</span> 一键导入
        </div>

    </div>

</div>

<div class="container">

<div>

<div class="hero">

    <h1>
        <span>Clash</span> 一键导入
    </h1>

    <p>
        自动识别 Windows / macOS / Android / iPhone
    </p>

    <div class="system" id="system">
        正在识别系统...
    </div>

</div>

<div class="grid" id="grid"></div>

<div class="notice">
    若无法自动拉起客户端，请复制订阅链接后手动导入。
</div>

<div class="footer">
    安全连接 · 隐私保护 · 永不记录用户信息
    <br>
    Powered By GitHub Pages
</div>

</div>

<div class="sidebar">

<div class="side-card">

    <div class="side-title">
        客服支持
    </div>

    <div class="contact">

        <div class="contact-icon">
            🐧
        </div>

        <div>

            <div class="contact-name">
                联系 QQ
            </div>

            <div class="contact-value">
                123456789
            </div>

        </div>

    </div>

    <div class="contact">

        <div class="contact-icon">
            💬
        </div>

        <div>

            <div class="contact-name">
                联系微信
            </div>

            <div class="contact-value">
                your_wechat
            </div>

        </div>

    </div>

    <div class="contact">

        <div class="contact-icon">
            📧
        </div>

        <div>

            <div class="contact-name">
                联系邮箱
            </div>

            <div class="contact-value">
                support@example.com
            </div>

        </div>

    </div>

</div>

</div>

</div>

<script>

/*
====================================
系统识别
====================================
*/

function detectSystem(){

    const ua =
    navigator.userAgent;

    if(/Windows/i.test(ua)){

        return "🖥 Windows";
    }

    if(/Macintosh|Mac OS X/i.test(ua)){

        return "🍎 macOS";
    }

    if(/Android/i.test(ua)){

        return "🤖 Android";
    }

    if(/iPhone|iPad|iPod/i.test(ua)){

        return "📱 iPhone / iPad";
    }

    return "🌐 Unknown";
}

document.getElementById("system")
.innerText =
"当前系统：" + detectSystem();

/*
====================================
订阅线路
====================================
*/

const subscriptions = [

{
    name:"订阅线路 1",
    icon:"🚀",
    color:"#3b82f6",
    password:"1111",
    url:"https://example.com/sub1.yaml"
},

{
    name:"订阅线路 2",
    icon:"⚡",
    color:"#22c55e",
    password:"2222",
    url:"https://example.com/sub2.yaml"
},

{
    name:"订阅线路 3",
    icon:"🪐",
    color:"#8b5cf6",
    password:"3333",
    url:"https://example.com/sub3.yaml"
},

{
    name:"订阅线路 4",
    icon:"☁️",
    color:"#f59e0b",
    password:"4444",
    url:"https://example.com/sub4.yaml"
},

{
    name:"订阅线路 5",
    icon:"🛡️",
    color:"#06b6d4",
    password:"5555",
    url:"https://example.com/sub5.yaml"
},

{
    name:"订阅线路 6",
    icon:"📶",
    color:"#ec4899",
    password:"6666",
    url:"https://example.com/sub6.yaml"
},

{
    name:"订阅线路 7",
    icon:"🌐",
    color:"#3b82f6",
    password:"7777",
    url:"https://example.com/sub7.yaml"
},

{
    name:"订阅线路 8",
    icon:"⭐",
    color:"#eab308",
    password:"8888",
    url:"https://example.com/sub8.yaml"
},

{
    name:"订阅线路 9",
    icon:"🍃",
    color:"#84cc16",
    password:"9999",
    url:"https://example.com/sub9.yaml"
},

{
    name:"订阅线路 10",
    icon:"💎",
    color:"#8b5cf6",
    password:"0000",
    url:"https://example.com/sub10.yaml"
}

];

/*
====================================
密码验证
====================================
*/

function verifyPassword(item){

    const input =
    prompt("请输入该线路密码");

    if(input !== item.password){

        alert("密码错误");

        return false;
    }

    return true;
}

/*
====================================
生成卡片
====================================
*/

const grid =
document.getElementById("grid");

subscriptions.forEach((item,index)=>{

    const card =
    document.createElement("div");

    card.className = "card";

    card.innerHTML = `

    <div class="icon">
        ${item.icon}
    </div>

    <div class="card-title">
        ${item.name}
    </div>

    <div class="card-desc">
        自动识别系统导入
    </div>

    <button
    class="btn"
    style="background:${item.color}"
    onclick="importSub(${index})">

        🚀 一键导入订阅

    </button>

    <button
    class="btn copy"
    onclick="copySub(${index})">

        📋 复制订阅链接

    </button>

    `;

    grid.appendChild(card);
});

/*
====================================
自动识别系统导入
====================================
*/

function importSub(index){

    const item =
    subscriptions[index];

    if(!verifyPassword(item)){

        return;
    }

    const ua =
    navigator.userAgent;

    let scheme = "";

    /*
    iPhone / iPad
    */

    if(/iPhone|iPad|iPod/i.test(ua)){

        scheme =

        "shadowrocket://add/sub://" +

        btoa(item.url);
    }

    /*
    Android
    */

    else if(/Android/i.test(ua)){

        scheme =

        "clash://install-config?url=" +

        encodeURIComponent(item.url);
    }

    /*
    Windows / macOS
    */

    else{

        scheme =

        "clash://install-config?url=" +

        encodeURIComponent(item.url);
    }

    window.location.href =
    scheme;
}

/*
====================================
复制
====================================
*/

async function copySub(index){

    const item =
    subscriptions[index];

    if(!verifyPassword(item)){

        return;
    }

    try{

        await navigator.clipboard
        .writeText(item.url);

        alert("订阅链接已复制");

    }catch(e){

        alert("复制失败");
    }
}

</script>

</body>
</html>
